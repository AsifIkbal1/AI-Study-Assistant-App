name: ai_study_asssitant
description: "A complete AI Study Assistant mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  flutter_markdown: ^0.7.2+1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  font_awesome_flutter: ^10.7.0
  animations: ^2.0.1
  uuid: ^4.4.0
  http: ^1.2.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
